name: Android APK

# Builds an installable debug APK for the Capacitor Android shell. Triggered on
# every push to main, plus a manual button (workflow_dispatch) in the Actions
# tab so a fresh APK can be produced without committing anything.
#
# The APK lands as a downloadable artifact attached to each workflow run:
#   GitHub → Actions → "Android APK" → pick a run → Artifacts → ryse-debug-apk
#
# Sideload to a phone: enable Settings → Apps → Special access → Install
# unknown apps for your browser/file manager, then open the downloaded .apk.

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'src/**'
      - 'public/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Capacitor CLI 8.x requires Node >=22
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build 2>&1 | tee /tmp/01-web.log

      - name: Sync Capacitor
        run: |
          set +e
          npx cap sync android 2>&1 | tee /tmp/02-cap-sync.log
          code=${PIPESTATUS[0]}
          if [ $code -ne 0 ]; then
            echo "::error::cap sync failed with exit code $code — last 30 lines below"
            tail -30 /tmp/02-cap-sync.log | while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::${line:0:400}"
            done
          fi
          exit $code

      - name: Gradle build (debug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/03-gradle.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryse-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /tmp/01-web.log
            /tmp/02-cap-sync.log
            /tmp/03-gradle.log
          if-no-files-found: warn
          retention-days: 14

      # Publish the APK to a "latest-android" rolling Release so it's downloadable
      # straight from a phone browser — no GitHub login required, just open the
      # link and tap-install.
      - name: Stage APK for release
        run: cp android/app/build/outputs/apk/debug/app-debug.apk ./ryse.apk

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-android
          name: Latest Android build
          body: |
            Debug-signed APK auto-built from `${{ github.sha }}`.
            Tap the asset below from your phone browser to download and install.
          files: ryse.apk
          prerelease: false
          make_latest: false
